<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful gradient matching Refreshing Summer Fun theme -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#219EBC" />
      <stop offset="100%" stop-color="#8ECAE6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Clean dark transparent styling for favicon rendering -->
  <g stroke="url(#blueGrad)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- VINTAGE POCKET WATCH -->
    <!-- Outer Watch Body -->
    <circle cx="256" cy="200" r="105" stroke-width="24" />
    <!-- Inner Clock Face Ring -->
    <circle cx="256" cy="200" r="80" stroke-width="10" opacity="0.7" />
    
    <!-- Watch Crown & Loop (Top Stem) -->
    <!-- Crown Neck -->
    <path d="M256,95 L256,70" stroke-width="20" />
    <!-- Crown Knob -->
    <path d="M236,70 L276,70" stroke-width="14" />
    <!-- Top Loop Ring -->
    <circle cx="256" cy="50" r="22" stroke-width="14" />

    <!-- Clock Hands (Time set to 10:10 for aesthetics) -->
    <!-- Hour Hand -->
    <path d="M256,200 L205,160" stroke-width="14" />
    <!-- Minute Hand -->
    <path d="M256,200 L310,150" stroke-width="10" />
    <!-- Center Pin -->
    <circle cx="256" cy="200" r="8" fill="url(#blueGrad)" stroke-width="4" />

    <!-- MINIMALIST HAND HOLDING THE WATCH FROM BELOW -->
    <!-- Wrist & Palm line -->
    <path d="M120,440 C150,410 180,380 200,340 C210,320 205,300 200,285" stroke-width="20" />
    <!-- Thumb (wrapping up left side) -->
    <path d="M185,280 C155,275 140,240 145,210 C148,195 155,185 160,180" stroke-width="18" />
    <!-- Index Finger (cradling watch base/right) -->
    <path d="M210,345 C240,365 285,365 315,345 C350,320 370,280 370,230 C370,215 365,205 360,200" stroke-width="18" />
    <!-- Middle Finger (outer support line) -->
    <path d="M205,370 C245,395 305,395 345,370 C380,340 395,295 395,245" stroke-width="12" opacity="0.6" />
    <!-- Ring Finger (minimalist accent line) -->
    <path d="M200,395 C250,425 325,425 375,395 C410,365 420,320 420,270" stroke-width="8" opacity="0.4" />
  </g>
</svg>
